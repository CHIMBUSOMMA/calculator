<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="calc.css" />
</head>
<body>
  <div class="calc-wrap">
    <h1>Scientific Calculator</h1>
    <div class="calculator">
      <input id="display" class="display" readonly />
      <div class="keys">
        <button data-action="clear">C</button>
        <button data-action="back">⌫</button>
        <button data-value="(">(</button>
        <button data-value=")">)</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button data-value="/">÷</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button data-value="*">×</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button data-value="-">−</button>

        <button data-value="0">0</button>
        <button data-value=".">.</button>
        <button data-action="ans">ANS</button>
        <button data-value="+">+</button>

        <button data-action="func" data-func="sin">sin</button>
        <button data-action="func" data-func="cos">cos</button>
        <button data-action="func" data-func="tan">tan</button>
        <button data-action="func" data-func="sqrt">√</button>

        <button data-action="func" data-func="ln">ln</button>
        <button data-action="func" data-func="log">log</button>
        <button data-action="power">^</button>
        <button data-action="const" data-const="pi">π</button>

        <button data-action="eval" class="equal">=</button>
      </div>
    </div>
    <p class="note">Tip: use the buttons only. Expressions support ^ for power.</p>
  </div>
  <script src="calc.js"></script>
</body>
</html>
